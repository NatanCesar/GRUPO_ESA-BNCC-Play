<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Squad Manager</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <main class="menu-container">

        <!-- Logo -->
        <img src="../assets/logo.png"
             alt="Tech Squad Manager" 
             class="logo">

        <!-- Campo de Nome -->
        <div class="input-group">
            <label for="playerName">Digite seu nome:</label>
            <input type="text" id="playerName" placeholder="Ex: Nataniel">
        </div>

        <!-- Botões -->
        <div class="button-group">
            <button class="btn primary" id="startBtn">
                Iniciar Turno
            </button>

            <button class="btn secondary" id="rankingBtn">
                🏆 Ranking
            </button>

            <button class="btn secondary" id="aboutBtn">
                Sobre
            </button>
        </div>

    </main>

    <script src="./script.js"></script>
</body>
</html>
