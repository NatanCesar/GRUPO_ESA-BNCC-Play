<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo — Tech Squad Manager</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <main class="game-container">

        <!-- HUD -->
        <header class="hud">
            <div>Nível: <span id="levelName"></span></div>
            <div>⏳ Tempo: <span id="timer"></span>s</div>
            <div>⭐ Pontos: <span id="score">0</span></div>
            <div>❤️ Vidas: <span id="lives"></span></div>
        </header>

        <!-- Área do Chamado -->
        <section class="call-area">
            <div class="call-card" draggable="true" id="callCard">
                <h3>Chamado</h3>
                <p id="callText"></p>
            </div>
        </section>

        <!-- Equipe -->
        <section class="team-area">
            <div class="drop-zone" data-role="frontend">Frontend</div>
            <div class="drop-zone" data-role="backend">Backend</div>
            <div class="drop-zone" data-role="devops">DevOps</div>
            <div class="drop-zone" data-role="ux">UX/UI</div>
            <div class="drop-zone" data-role="qa">QA</div>
            <div class="drop-zone" data-role="data">Dados</div>
        </section>

    </main>

    <script src="./script.js"></script>
</body>

</html>
