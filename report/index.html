<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Final — Tech Squad Manager</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <main class="report-container">

        <h1>Relatório de Desempenho</h1>
        <p class="subtitle">Resumo da sua gestão</p>

        <div class="report-card">

            <h2 id="classification"></h2>

            <p><strong>Pontuação Final:</strong> <span id="finalScore"></span></p>
            <p><strong>Aproveitamento:</strong> <span id="accuracy"></span>%</p>
            <p><strong>Chamados Resolvidos:</strong> <span id="summary"></span></p>

        </div>

        <div class="button-group">
            <button class="btn primary" id="playAgain">Jogar Novamente</button>
            <button class="btn secondary" id="backMenu">Voltar ao Menu</button>
        </div>

    </main>

    <script src="./script.js"></script>
</body>

</html>
