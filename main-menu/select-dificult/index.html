<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionar Nível — Tech Squad Manager</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <main class="levels-container">

        <h1>Selecione o Nível</h1>
        <p class="subtitle">Escolha o desafio da sua gestão</p>

        <div class="levels-grid">

            <div class="level-card" data-level="intern">
                <h2>Estagiário</h2>
                <p>Ideal para iniciantes</p>
                <ul>
                    <li>5 chamados</li>
                    <li>30s por chamado</li>
                    <li>5 vidas</li>
                </ul>
                <button class="btn select-btn">Selecionar</button>
            </div>

            <div class="level-card" data-level="junior">
                <h2>Júnior</h2>
                <p>Desafio intermediário</p>
                <ul>
                    <li>8 chamados</li>
                    <li>20s por chamado</li>
                    <li>3 vidas</li>
                </ul>
                <button class="btn select-btn">Selecionar</button>
            </div>

            <div class="level-card" data-level="senior">
                <h2>Sênior</h2>
                <p>Alta pressão e precisão</p>
                <ul>
                    <li>12 chamados</li>
                    <li>15s por chamado</li>
                    <li>2 vidas</li>
                </ul>
                <button class="btn select-btn">Selecionar</button>
            </div>

        </div>

        <div class="footer-buttons">
            <button class="btn secondary" id="backBtn">Voltar</button>
        </div>

    </main>

    <script src="./script.js"></script>
</body>

</html>
